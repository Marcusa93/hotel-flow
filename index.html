<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoMe — Hotel Management</title>
    <meta name="description" content="Sistema de gestión hotelera — Digital Amenities" />
    <meta name="author" content="Digital Amenities" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HoMe" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Hasta acá no había ningún rel="icon" ni favicon.ico, así que la pestaña
         mostraba el ícono genérico del navegador. El .ico va primero porque
         Windows y los lectores viejos lo siguen prefiriendo; los PNG los toman
         los navegadores modernos según densidad. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <!-- Este es el ícono del hotel, no el de HomeApp: es el que queda en la
         pantalla de inicio del celular de recepción cuando instalan la app. -->
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta property="og:title" content="HoMe — Hotel Management" />
    <meta property="og:description" content="Sistema de gestión hotelera — Digital Amenities" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fraunces: editorial luxury display · Hanken Grotesk: crisp warm UI body -->
    <!-- El eje de peso llega a 900 porque varios títulos y cifras usan 800. Con
         el rango cortado en 700 el navegador engordaba el trazo por su cuenta y
         en una serif eso se ve embarrado. -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
