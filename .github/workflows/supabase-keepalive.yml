name: Supabase Keepalive

on:
  schedule:
    - cron: '17 3,15 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Supabase keepalive RPC
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          : "${SUPABASE_PROJECT_URL:?Missing SUPABASE_PROJECT_URL secret}"
          : "${SUPABASE_ANON_KEY:?Missing SUPABASE_ANON_KEY secret}"

          response="$(
            curl --silent --show-error --fail-with-body \
              --retry 3 \
              --retry-delay 5 \
              -X POST \
              "${SUPABASE_PROJECT_URL%/}/rest/v1/rpc/keepalive" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "Accept-Profile: api" \
              -H "Content-Profile: api" \
              -d '{}'
          )"

          echo "$response"
          echo "$response" | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true'
